<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>termini</title>
    <style>
      /* Paint the app background before React/CSS load to avoid a white flash
         on startup. React replaces #root's contents once it mounts. */
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background-color: #191d2d;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #191d2d;
      }

      #app-splash .spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(255, 255, 255, 0.7);
        animation: app-splash-spin 0.8s linear infinite;
      }

      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="app-splash">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
